{% extends "base.html" %}
{% block title %}Register - Placement Portal{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header">
        <h4 class="mb-0">
          Register as {{ 'Student' if role == 'student' else 'Company' }}
        </h4>
      </div>
      <div class="card-body">
        <form method="post">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Username</label>
              <input name="username" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Email</label>
              <input name="email" type="email" class="form-control" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" required>
          </div>

          {% if role == 'student' %}
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input name="full_name" class="form-control" required>
            </div>
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label">Contact</label>
                <input name="contact" class="form-control">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label">Branch</label>
                <input name="branch" class="form-control">
              </div>
              <div class="col-md-2 mb-3">
                <label class="form-label">Year</label>
                <input name="year" type="number" min="1" max="5" class="form-control">
              </div>
              <div class="col-md-2 mb-3">
                <label class="form-label">CGPA</label>
                <input name="cgpa" type="number" step="0.01" class="form-control">
              </div>
            </div>
          {% else %}
            <div class="mb-3">
              <label class="form-label">Company Name</label>
              <input name="company_name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">HR Contact</label>
              <input name="hr_contact" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Website</label>
              <input name="website" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Address</label>
              <textarea name="address" class="form-control" rows="2"></textarea>
            </div>
          {% endif %}

          <button class="btn btn-success w-100" type="submit">Register</button>
        </form>
        <div class="mt-3 text-center small">
          Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
