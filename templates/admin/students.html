{% extends "base.html" %}
{% block title %}Admin - Students{% endblock %}
{% block content %}
<h3 class="mb-3">Students</h3>
<div class="card">
  <div class="card-body table-responsive">
    <table class="table table-hover">
      <thead>
      <tr>
        <th>Name</th>
        <th>Username</th>
        <th>Branch</th>
        <th>Year</th>
        <th>CGPA</th>
      </tr>
      </thead>
      <tbody>
      {% for s in students %}
        <tr>
          <td>{{ s.full_name }}</td>
          <td>{{ s.user.username }}</td>
          <td>{{ s.branch }}</td>
          <td>{{ s.year }}</td>
          <td>{{ "%.2f"|format(s.cgpa or 0) }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
